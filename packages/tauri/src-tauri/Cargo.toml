[package]
name = "mhaoltube-desktop"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaoltube_desktop"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5", features = [] }

[dependencies]
tauri = { version = "2.10", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
mhaoltube-backend = { path = "../../backend" }
