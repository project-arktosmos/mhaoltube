<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Mhaoltube — an open-source alternative YouTube client for desktop and mobile. Download videos, manage libraries, and stream media on your terms." />
		<meta name="keywords" content="youtube, alternative, client, video, download, open source, desktop, android, macos" />
		<meta property="og:title" content="Mhaoltube — Alternative YouTube Client" />
		<meta property="og:description" content="An open-source alternative YouTube client for desktop and mobile. Download videos, manage libraries, and stream media on your terms." />
		<meta property="og:type" content="website" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			try {
				var stored = localStorage.getItem('object-service:theme-settings');
				if (stored) {
					var theme = JSON.parse(stored).theme;
					if (theme === 'dark' || theme === 'light') {
						document.documentElement.setAttribute('data-theme', theme);
					}
				}
			} catch (e) {}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
