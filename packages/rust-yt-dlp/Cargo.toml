[package]
name = "mhaoltube-yt-dlp"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "mhaoltube-yt-dlp-server"
path = "src/server.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }
tokio-stream = "0.1"
async-stream = "0.3"
reqwest = { version = "0.12", features = ["json", "stream", "gzip", "brotli", "cookies"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1.0"
thiserror = "2.0"
parking_lot = "0.12"
boa_engine = "0.20"
log = "0.4"
env_logger = "0.11"
url = "2"
regex = "1"
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
