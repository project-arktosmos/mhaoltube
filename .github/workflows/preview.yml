name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/website/**'
      - 'packages/common/**'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Website Preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm -r --filter website build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-preview-pr-${{ github.event.pull_request.number }}
          path: packages/website/dist
          retention-days: 7

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### Website Preview',
              '',
              'A preview build of the website has been uploaded as an artifact.',
              '',
              `**[Download preview artifact](${runUrl}#artifacts)**`,
              '',
              'To view locally: download and extract the artifact, then serve with any static file server (e.g. `npx serve .`).'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes('### Website Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
