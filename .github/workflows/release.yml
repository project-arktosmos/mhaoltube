name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-linux-tauri:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false

  build-macos-tauri:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ### macOS
            If the app is blocked by Gatekeeper, open Terminal and run:
            ```
            xattr -cr /Applications/Mhaoltube.app
            ```
            Then open the app normally.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

  build-windows-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/tauri
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "ndk;27.0.12077973" "build-tools;36.0.0" "platforms;android-36"

      - name: Set NDK path
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          if [ ! -d "$NDK_PATH" ]; then
            echo "ERROR: NDK not found at $NDK_PATH"
            ls -la "$ANDROID_HOME/ndk/" || echo "No NDK directory"
            exit 1
          fi
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build frontend
        run: pnpm -r --filter frontend build

      - name: Initialize Tauri Android
        working-directory: packages/tauri
        run: pnpm tauri android init

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/release.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias upload \
            -storepass android -keypass android \
            -dname 'CN=Mhaoltube, O=Arktosmos, C=US'
          cat > packages/tauri/src-tauri/gen/android/keystore.properties << 'EOF'
          storeFile=/tmp/release.keystore
          keyAlias=upload
          password=android
          EOF

      - name: Build Android APK
        working-directory: packages/tauri
        run: pnpm tauri android build --apk

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp packages/tauri/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk \
             mhaoltube-${TAG}-android-universal.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: mhaoltube-*-android-universal.apk

  deploy-website:
    needs: [build-linux-tauri, build-macos-tauri, build-windows-tauri, build-android]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - name: Fetch release asset URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ASSETS=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.assets[] | {name: .name, url: .browser_download_url}')

          get_url() {
            echo "$ASSETS" | jq -r "select(.name | test(\"$1\")) | .url" | head -1
          }

          MACOS=$(get_url '\\.(dmg)$')
          WINDOWS=$(get_url '\\.(msi|exe)$')
          LINUX=$(get_url '\\.(AppImage|deb)$')
          ANDROID=$(get_url '\\.apk$')

          cat > packages/website/src/data/releases.json << EOF
          {
            "macos": "${MACOS:-}",
            "windows": "${WINDOWS:-}",
            "linux": "${LINUX:-}",
            "android": "${ANDROID:-}"
          }
          EOF

      - name: Build website
        run: pnpm -r --filter website build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
